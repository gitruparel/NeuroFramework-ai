cache_version: "2026-06-baseline"

profiles:
  autism:
    - transform: reorient
      params: { target: "RAS" }
    - transform: bias_correction
      params: { strategy: "n4", mode: "fast", convergence_threshold: 0.000001 }
    - transform: skull_strip
      params: { strategy: "threshold" }
    - transform: normalize
      params: { mode: "z_score" }
    - transform: crop_foreground
      params: {}
    - transform: resample
      params: { spacing: [1.0, 1.0, 1.0] }
    - transform: resize
      params: { target_shape: [128, 128, 128] }

  alzheimer:
    - transform: reorient
      params: { target: "RAS" }
    - transform: bias_correction
      params: { strategy: "n4", mode: "fast", convergence_threshold: 0.000001 }
    - transform: skull_strip
      params: { strategy: "threshold" }
    - transform: crop_foreground
      params: {}
    - transform: resample
      params: { spacing: [1.0, 1.0, 1.0] }
    - transform: resize
      params: { target_shape: [128, 128, 128] }
    - transform: normalize
      params: { mode: "z_score" }

  tumor:
    - transform: reorient
      params: { target: "RAS" }
    - transform: resample
      params: { spacing: [1.0, 1.0, 1.0] }
    - transform: resize
      params: { target_shape: [128, 128, 128] }
    - transform: normalize
      params: { mode: "min_max" }
