training:
  epochs: 100
  mixed_precision: true
  seed: 42
  optimizer:
    name: "AdamW"
    lr: 1e-4
    weight_decay: 1e-2
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 100
    eta_min: 1e-6
  loss:
    name: "DiceCELoss"
  checkpoint:
    monitor: "val_loss"
    mode: "min"
    save_top_k: 3
  early_stopping:
    patience: 15
    min_delta: 1e-4
  wandb:
    project: "brain-mri-analysis"
    log_model: true
